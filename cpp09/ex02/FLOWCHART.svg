<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="2100" viewBox="0 0 1400 2100">
	<defs>
		<style>
			.bg { fill: #f7f7f2; }
			.title { font: 700 34px Arial, sans-serif; fill: #17202a; }
			.subtitle { font: 400 16px Arial, sans-serif; fill: #34495e; }
			.section { font: 700 24px Arial, sans-serif; fill: #17202a; }
			.box { fill: #ffffff; stroke: #263238; stroke-width: 2; rx: 8; }
			.box-blue { fill: #e8f1ff; stroke: #255c99; stroke-width: 2; rx: 8; }
			.box-green { fill: #e9f7ef; stroke: #1e8449; stroke-width: 2; rx: 8; }
			.box-yellow { fill: #fff4d6; stroke: #a66f00; stroke-width: 2; rx: 8; }
			.box-red { fill: #fdecea; stroke: #b03a2e; stroke-width: 2; rx: 8; }
			.decision { fill: #ffffff; stroke: #263238; stroke-width: 2; }
			.text { font: 400 15px Arial, sans-serif; fill: #17202a; }
			.small { font: 400 13px Arial, sans-serif; fill: #34495e; }
			.note { font: 400 14px Arial, sans-serif; fill: #34495e; }
			.edge { stroke: #263238; stroke-width: 2; fill: none; marker-end: url(#arrow); }
			.edge-soft { stroke: #7f8c8d; stroke-width: 2; fill: none; marker-end: url(#arrow-soft); }
			.label { font: 700 13px Arial, sans-serif; fill: #17202a; }
		</style>
		<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
			<path d="M2,2 L10,6 L2,10 Z" fill="#263238"/>
		</marker>
		<marker id="arrow-soft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
			<path d="M2,2 L10,6 L2,10 Z" fill="#7f8c8d"/>
		</marker>
	</defs>

	<rect class="bg" x="0" y="0" width="1400" height="2100"/>

	<text class="title" x="60" y="60">PmergeMe Ford-Johnson Flowchart</text>
	<text class="subtitle" x="60" y="88">Graphical explanation dyal parsing, vector/deque sorting, recursion, pending insertion, upper_bound, w comparison counter.</text>

	<!-- Program flow -->
	<text class="section" x="60" y="145">1. Program flow</text>

	<rect class="box-blue" x="80" y="180" width="180" height="55"/>
	<text class="text" x="122" y="212">start program</text>

	<polygon class="decision" points="390,165 500,208 390,250 280,208"/>
	<text class="text" x="354" y="205">argc &lt; 2?</text>

	<rect class="box-red" x="575" y="180" width="160" height="55"/>
	<text class="text" x="615" y="212">print Error</text>

	<rect class="box" x="80" y="295" width="180" height="55"/>
	<text class="text" x="114" y="327">create sorter</text>

	<rect class="box" x="320" y="295" width="180" height="55"/>
	<text class="text" x="363" y="327">run()</text>

	<rect class="box-yellow" x="560" y="295" width="210" height="55"/>
	<text class="text" x="605" y="327">parse args</text>

	<polygon class="decision" points="940,278 1075,323 940,368 805,323"/>
	<text class="text" x="870" y="321">valid positive ints?</text>

	<rect class="box-green" x="1095" y="295" width="220" height="55"/>
	<text class="text" x="1124" y="327">fill vector and deque</text>

	<polygon class="decision" points="205,430 345,475 205,520 65,475"/>
	<text class="text" x="145" y="473">already sorted?</text>

	<rect class="box-yellow" x="430" y="447" width="180" height="55"/>
	<text class="text" x="470" y="479">print Before</text>

	<rect class="box" x="680" y="447" width="210" height="55"/>
	<text class="text" x="713" y="479">sort vector + time</text>

	<rect class="box" x="960" y="447" width="210" height="55"/>
	<text class="text" x="992" y="479">sort deque + time</text>

	<rect class="box-green" x="560" y="575" width="210" height="55"/>
	<text class="text" x="600" y="607">print result</text>

	<rect class="box-blue" x="850" y="575" width="220" height="55"/>
	<text class="text" x="884" y="607">print comparisons</text>

	<rect class="box-blue" x="1135" y="575" width="145" height="55"/>
	<text class="text" x="1188" y="607">end</text>

