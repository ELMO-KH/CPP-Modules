	<!-- comparator -->
	<text class="section" x="60" y="2040">5. less comparator: count + compare value + compare id for duplicates</text>
	<rect class="box-blue" x="80" y="2065" width="250" height="45"/>
	<text class="text" x="105" y="2093">_comparison_count++</text>

	<rect class="box" x="395" y="2065" width="260" height="45"/>
	<text class="text" x="424" y="2093">compare lhs.value</text>

	<rect class="box" x="720" y="2065" width="260" height="45"/>
	<text class="text" x="755" y="2093">if equal compare id</text>

	<rect class="box-green" x="1045" y="2065" width="260" height="45"/>
	<text class="text" x="1094" y="2093">return bool</text>

	<path class="edge-soft" d="M330 2087 L395 2087"/>
	<path class="edge-soft" d="M655 2087 L720 2087"/>
	<path class="edge-soft" d="M980 2087 L1045 2087"/>
</svg>
